name: CI SpringBoot Angular MySQL

on:
  push:
    branches: [ "main" ]

jobs:
  build_push_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Spring Boot image
        uses: docker/build-push-action@v6
        with:
          context: ./springboot/app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:${{ github.sha }}

      - name: Build & push Angular image
        uses: docker/build-push-action@v6
        with:
          context: ./angular-app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:${{ github.sha }}

      - name: Start application with Docker Compose
        run: docker-compose up -d

      - name: Show containers
        run: docker-compose ps

      - name: Stop containers
        if: always()
        run: docker-compose down
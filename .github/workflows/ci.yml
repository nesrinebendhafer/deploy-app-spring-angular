name: CI SpringBoot Angular MySQL

on:
  push:
    branches: [ "main" ]

jobs:
  build_push_test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout du code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4️⃣ Build & Push Spring Boot image
      - name: Build & push Spring Boot image
        uses: docker/build-push-action@v6
        with:
          context: ./springboot/app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:${{ github.sha }}

      # 5️⃣ Build & Push Angular image
      - name: Build & push Angular image
        uses: docker/build-push-action@v6
        with:
          context: ./angular-app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:${{ github.sha }}

      # 6️⃣ Lancer l’application avec Docker Compose
      - name: Start application with Docker Compose
        run: docker compose up -d

      # 7️⃣ Vérifier les conteneurs
      - name: Show containers
        run: docker compose ps

      # 8️⃣ Afficher logs si problème
      - name: Logs (debug)
        if: always()
        run: docker compose logs --no-color

      # 9️⃣ Stop des conteneurs
      - name: Stop containers
        if: always()
        run: docker compose down